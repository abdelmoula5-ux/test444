# QuizPulse — Déploiement Azure Web App

## Structure du projet

```
quizpulse/
├── quizpulse.html          ← Application complète (SPA)
├── server.js               ← Serveur Express Node.js
├── package.json            ← Dépendances
├── web.config              ← Configuration Azure IIS
└── .github/
    └── workflows/
        └── deploy.yml      ← CI/CD GitHub Actions
```

## Déploiement rapide (Azure CLI)

```bash
# 1. Installer Azure CLI → https://aka.ms/installazurecli

# 2. Se connecter
az login

# 3. Déployer (remplacez les valeurs entre <>)
az webapp up \
  --name <NOM_DE_VOTRE_APP> \
  --resource-group <NOM_RESOURCE_GROUP> \
  --runtime "NODE:20-lts" \
  --os-type Linux

# 4. Voir les logs
az webapp log tail \
  --name <NOM_DE_VOTRE_APP> \
  --resource-group <NOM_RESOURCE_GROUP>
```

## Test local

```bash
npm install
node server.js
# → http://localhost:8080
```

## Variables d'environnement Azure (Settings → Environment variables)

| Nom | Valeur |
|-----|--------|
| WEBSITE_NODE_DEFAULT_VERSION | ~20 |
| SCM_DO_BUILD_DURING_DEPLOYMENT | true |

## Supabase CORS

Ajouter votre URL Azure dans Supabase :
Settings → API → Allowed origins → https://<NOM>.azurewebsites.net
